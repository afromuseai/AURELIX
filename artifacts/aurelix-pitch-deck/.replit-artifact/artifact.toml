kind = "slides"
previewPath = "/aurelix-pitch-deck/"
title = "AURELIX SYSTEMS Pitch Deck"
version = "1.0.0"
id = "artifacts/aurelix-pitch-deck"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/aurelix-pitch-deck/" ]
localPort = 22243

[services.development]
run = "pnpm --filter @workspace/aurelix-pitch-deck run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aurelix-pitch-deck", "run", "build" ]
publicDir = "artifacts/aurelix-pitch-deck/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22243"
BASE_PATH = "/aurelix-pitch-deck/"
